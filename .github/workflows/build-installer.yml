name: Build Windows Installer

# Builds GoogleResultClicker-Setup.exe entirely in the cloud on a Windows
# runner. You never need a Windows PC or Python installed locally.
#
# How to get the installer:
#   * Automatic on every push to main -> download it from the run's "Artifacts".
#   * Push a version tag (e.g. `git tag v1.0.0 && git push --tags`) -> a GitHub
#     Release is created with the installer attached as a downloadable asset you
#     can share with anyone.
#   * Or trigger it by hand from the Actions tab ("Run workflow").

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build the .exe with PyInstaller
        run: pyinstaller --noconfirm --clean clicker.spec

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=1.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure Inno Setup is available
        run: |
          if (-not (Test-Path "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe")) {
            choco install innosetup --no-progress -y
          }

      - name: Compile the installer with Inno Setup
        run: >
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ steps.version.outputs.value }}
          installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoogleResultClicker-Setup
          path: installer-output/GoogleResultClicker-Setup.exe

      - name: Attach installer to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer-output/GoogleResultClicker-Setup.exe
